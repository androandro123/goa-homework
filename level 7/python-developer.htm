<script type="2d74b48e9cc2812f7eb3b6cf-text/javascript">
	const userIdLS = JSON.parse(localStorage.getItem('user'));
	const userId = userIdLS?.data?.id;

	function hasSubdomain() {
    	const hostname = new URL(window.location.href).hostname;
		const parts = hostname.split('.');
    	return parts.length > 2 && !(parts.length === 3 && parts[0] === 'www');
	}

	const apiEndpoint = hasSubdomain()
		? 'https://dev-api2.sololearn.com/web-logs/client-error'
		: 'https://api2.sololearn.com/v2/web-logs/client-error';

	function extractErrorInfo(error) {
		let message = '';
		let stack = 'Stack not available';

		if (error instanceof Error) {
			message = error.message;
			stack = error.stack || stack;
		} else if (typeof error === 'object') {
			message = error && JSON.stringify(error);
		} else {
			message = error && String(error);
		}

		return { message, stack };
	}

	window.addEventListener('error', (event) => {
		const { message, stack } = extractErrorInfo(event.error);

		fetch(apiEndpoint, {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json',
			},
			body: JSON.stringify({
				error: `${message || event.message} at ${event.filename}:${event.lineno}:${event.colno}`,
				userId: userId,
				location: window.location.href,
				stack: stack
			})
		}).catch(console.error);
  	});
  
 	window.addEventListener('unhandledrejection', (event) => {
		const { message, stack } = extractErrorInfo(event.reason);
  
		fetch(apiEndpoint, {
			method: 'POST',
			headers: {
				'Content-Type': 'application/json',
			},
			body: JSON.stringify({
				error: message,
				stack: stack,
				userId: userId,
				location: window.location.href,
			})
		}).catch(console.error);
  	});
</script>

","web-home.success-story-cta":"Start your success story","web-home.user-story1-certificate-title":"Web developer Certificate","web-home.user-story1-completed-course-title":"Finished the Kotlin track","web-home.user-story1-description":"\"One day at the library, I noticed a stranger using an app that featured tutorials, questions, and exercises for C++ programming. It was Sololearn. I thought, \"Neat, learning on your mobile phone!\" I was just starting to learn to code and I made all the usual beginner mistakes, so I gave Sololearn a try. Through Sololearn, I have found many learners who have helped me grow. I have met teachers, engineers, developers, data scientists, and more amazing people. The learning environment created by Sololearn served as a catalyst for me to pick up good practices, which go beyond learning and into the workplace.\"\nHatsy Rei, June 01, 2020","web-home.user-story1-thanks-text":"Thank you Hatsy!","web-home.user-story1-title":"The Success Story of Hatsy","web-home.user-story1-title-highlighted":"Hatsy","web-home.user-story2-certificate-title":"Web developer Certificate","web-home.user-story2-completed-course-title":"Finished the Kotlin track","web-home.user-story2-description":"Neetish R. started using Sololearn during his sophomore year as a computer science student with no coding experience. Through the Sololearn community, he met David C., an experienced developer and tech lead for a team located in India. David mentored Neetish, learned he was from India, and invited him to interview for a job on his team. Neetish followed through, nailed the interview process, and got his first job! Here's what Neetish has to say about Sololearn:\n \"If you are a learner then you might find your family among the Sololearn community.\" \n\n Neetish R., 2018","web-home.user-story2-thanks-text":"Thank you Neetish R.!","web-home.user-story2-title":"The Success Story of Neetish R.","web-home.user-story2-title-highlighted":"Neetish R.","web-home.why-code-acti lp.angular-course-footer-title":"Google's calling!","web-lelp.angular-developer-course-footer-button-text":"Get your certificate","web-lelp.angular-developer-course-footer-description":"Ready to become an Angular expert for Google, its official partners, and any of the leading brands using this versatile and easily reusable framework? Start today, even with zero coding experience!","web-lelp.angular-developer-course-footer-title":"Google's calling!","web-lelp.angular-developer-google-hire-button-text":"Train for Google now","web-lelp.angular-developer-google-hire-description":"Ever thought it might be cool to work at Google? Well, now you can!\u003C\u002Fbr\u003E\u003C\u002Fbr\u003EGoogle is always on the lookout for Angular developers, and you can be one of them. Our courses are \u003Cb\u003E100% beginner-friendly.\u003C\u002Fb\u003E No coding experience needed.\u003C\u002Fbr\u003E\u003C\u002Fbr\u003ETrain for a job at Google and its partner companies with our 5-minute lessons that fit perfectly into your every lifestyle. Learn as fast as you like, from your phone, wherever you are.","web-lelp.angular-developer-google-hire-title":"Google wants to hire \u003Ci\u003Eyou!\u003C\u002Fi\u003E","web-lelp.angular-developer-headerInfo-description":"Google has asked us to train Angular developers, so we've teamed up and co-developed this free course to get you qualified in Google's code of choice!","web-lelp.angular-developer-headerInfo-title":"Google Developer Course with Angular","web-lelp.angular-developer-meta-description":"Learn Angular the easy way! Simple bite-sized daily lessons, fun practice exercises, and a supportive global community. Great for beginners!","web-lelp.angular-developer-meta-title":"Front-end for Beginners | Learn with Sololearn","web-lelp.angular-developer-signup-description":"Learn Angular to kick start your career!","web-lelp.angular-developer-signup-title":"Sign up","web-lelp.angular-developer-what-you-learn-description":"This course will enable you to understand and use the Angular framework, create scalable and dynamic web applications using Angular and TypeScript, employ components for organized and structured code, implement user interaction features, design forms with validation, master Angular routing, and so much more.","web-lelp.angular-developer-what-you-learn-item0-title":"The Angular framework","web-lelp.angular-developer-what-you-learn-item1-title":"Angular components","web-lelp.angular-developer-what-you-learn-item2-title":"Single-page applications (SPAs)","web-lelp.angular-developer-what-you-learn-item3-title":"Angular CLI (command-line interface)","web-lelp.angular-developer-what-you-learn-item4-title":"Data binding techniques","web-lelp.angular-developer-what-you-learn-item5-title":"Forms in Angular","web-lelp.angular-developer-what-you-learn-item6-title":"Routing and navigation","web-lelp.angular-developer-what-you-learn-item7-title":"Event binding and handling","web-lelp.angular-developer-what-you-learn-title":"What you'll learn","web-lelp.angular-developer-why-angular-description":"Google's Angular Team designed and developed Angular as a \u003Cb\u003Efree, highly versatile\u003C\u002Fb\u003E and open-source framework. Today the ever-growing Angular community includes thousands of successful companies, from Forbes to Upwork, HBO to LEGO to Rockstar Games.","web-lelp.angular-developer-why-angular-item0-title":"Less code to write","web-lelp.angular-developer-why-angular-item1-title":"Scalable and reusable","web-lelp.angular-developer-why-angular-item2-title":"Easier to maintain","web-lelp.angular-developer-why-angular-item3-title":"Ideal for small dev teams","web-lelp.angular-developer-why-angular-title":"Why Google developed Angular","web-lelp.angular-developer-why-sololearn-description":"For years Google and Sololearn have led innovation in their respective fields of tech and education, and we share a common commitment: to keep the internet free and accessible for all.","web-lelp.angular lelp.angular-why-sololearn-item2-title":"4.8 stars on the App Store","web-lelp.angular-why-sololearn-item3-title":"Google Play Editors' Choice","web-lelp.angular-why-sololearn-item4-title":"Facebook's FbStart App Of The Year","web-lelp.angular-why-sololearn-item5-title":"Free and accessible, forever","web-lelp.angular-why-sololearn-title":"Why Google chose Sololearn","web-lelp.breadcrumb-courses":"Courses","web-lelp.c-intermediate-blog-section-item0-description":"Programming has become a very popular occupation in the past few years. No need to mention that, on average, programming jobs are paid significantly higher wages than positions in other sectors, and as a result, jobs for skilled professionals are in high demand. But even if you do not follow a programming career path, having an understanding of at least one or two programming languages makes for an impressive addition to any resume. In addition, you become more competitive during this time, when even kids learn programming starting from school.","web-lelp.c-intermediate-blog-section-item0-link":"Continue reading on our blog","web-lelp.c-intermediate-blog-section-item0-title":"Top 5 Programming Languages You Need to Learn","web-lelp.c-intermediate-blog-section-item1-description":"One of the most popular of those new Ruby competitors? Crystal. Combining many of the best features of Ruby with the speed of the C programming language, Crystal has been attracting followers with its dynamic combination of intuitive Ruby elements and hyper-charged C speed. By taking the best of both worlds and combining them into one package, Crystal offers programmers both experienced and new a wise choice to add to their programming arsenal.","web-lelp.c-intermediate-blog-section-item1-link":"Continue reading on our blog","web-lelp.c-intermediate-blog-section-item1-title":"What is Crystal?","web-lelp.c-intermediate-blog-section-item2-description":"We asked and you answered! For our first question of the week segment, we asked you -what-you-learn-item3-title":"Exceptions","web-lelp.c-intermediate-what-you-learn-title":"What you'll learn","web-lelp.c-introduction-blog-section-item0-description":"Programming has become a very popular occupation in the past few years. No need to mention that, on average, programming jobs are paid significantly...","web-lelp.c-introduction-blog-section-item0-link":"Continue reading on our blog","web-lelp.c-introduction-blog-section-item0-title":"Top 5 Programming Languages You Need to Learn","web-lelp.c-introduction-blog-section-item1-description":"We’ve mentioned in previous blogs how there is no shortage of Ruby programming enthusiasts out there. For years, Ruby was one of the premiere web...","web-lelp.c-introduction-blog-section-item1-link":"Continue reading on our blog","web-lelp.c-introduction-blog-section-item1-title":"What is Crystal?","web-lelp.c-introduction-blog-section-item2-description":"We asked and you answered! For our first question of the week segment, we asked you to ask one question you wanted us to answer and you delivered! This...","web-lelp.c-introduction-blog-section-item2-link":"Continue reading on our blog","web-lelp.c-introduction-blog-section-item2-title":"What Is Assembly And How Is It Used?","web-lelp.c-introduction-blog-section-title":"What you’ll learn","web-lelp.c-introduction-footer-button":"Start learning","web-lelp.c-introduction-footer-title":"Start learning Introduction to C today","web-lelp.c-introduction-headerInfo-description":"Do you want to create powerful programs that run fast… faster than those written in other languages?\nC is a language that’s easy to write, allows for fast debugging, and is a building block for many other programming languages.\nWith this course you’ll learn the foundations of this powerful and advanced programming language. No prior coding experience is necessary, we’ll teach you everything you need to know in a clear, simple way that’s perfect for beginners.\nWhen you’re done you can take a look e C++ for in your own creative or professional career.","web-lelp.c-plus-plus-intermediate-blog-section-item0-link":"Continue reading on our blog","web-lelp.c-plus-plus-intermediate-blog-section-item0-title":"What is C++ Used For?","web-lelp.c-plus-plus-intermediate-blog-section-item1-description":"Since the stakes are so high when dealing with cybersecurity, this is not a field where companies will roll the dice with unproven hires. In fact, most companies hiring for cybersecurity roles are looking for data security analysts who generally hold at least a bachelor’s degree in computer science, software engineering, information assurance, or a related field. But this is just for some entry-level positions. Truthfully, many more companies prefer candidates who hold a master’s degree in business administration in information systems, which ensures a more detailed academic focus in cybersecurity specifically.","web-lelp.c-plus-plus-intermediate-blog-section-item1-link":"Continue reading on our blog","web-lelp.c-plus-plus-intermediate-blog-section-item1-title":"What Do You Need To Learn For A Career In Cybersecurity?","web-lelp.c-plus-plus-intermediate-blog-section-item2-description":"While Apple often gets much of the hype and glitter in the United States and other Western economies, Android devices remain far more prevalent and popular throughout the world. From Samsung to LG, Huawei to Google, there are a plethora of companies creating Android-powered devices that only thrive thanks to the capabilities and possibilities of Android operating systems. This also means that because of the importance of good Android OS options, Android developers continue to be in significant demand around the world.","web-lelp.c-plus-plus-intermediate-blog-section-item2-link":"Continue reading on our blog","web-lelp.c-plus-plus-intermediate-blog-section-item2-title":"3 Languages You Should Know To Become An Android Developer","web-lelp.c-plus-plus-intermediate-blog-section-title":"What you'll learn","web-lelp.c-plus-plus-intermediate-footer-button":"Start learning","web-lelp.c-plus-plus-intermediate-footer-title":"Start learning C++ today","web-lelp.c-plus-plus-intermediate-headerInfo-description":"Take your skills in C++ programming to the next level by incorporating elements of the object-oriented programming approach to solve complex problems with effective, flexible, and reusable software. We recommend you’re comfortable with the concepts covered in our Introduction to C++ course. If you are, then dive right in and sharpen your C++ skills!","web-lelp.c-plus-plus-intermediate-headerInfo-title":"C++ Intermediate","web-lelp.c-plus-plus-intermediate-meta-title":"C++ Intermediate | Learn with Sololearn","web-lelp.c-plus-plus-intermediate-signup-description":"Learn C++ to kick start your career!","web-lelp.c-plus-plus-intermediate-signup-title":"Create your free Sololearn account","web-lelp.c-plus-plus-intermediate-what-you-learn-item0-description":"Use principles of Object-Oriented Programming to organize the design of your software around data.","web-lelp.c-plus-plus-intermediate-what-you-learn-item0-title":"Objects","web-lelp.c-plus-plus-intermediate-what-you-learn-item1-description":"Create classes as templates to create different programming objects.","web-lelp.c-plus-plus-intermediate-what-you-learn-item1-title":"Classes and Objects","web-lelp.c-plus-plus-intermediate-what-you-learn-item2-description":"Use constructors and deconstructors to manipulate objects. (Sounds like something a supervillain would learn, right?)","web-lelp.c-plus-plus-intermediate-what-you-learn-item2-title":"Constructors and Destructors","web-lelp.c-plus-plus-intermediate-what-you-learn-item3-description":"Use inheritance to make your code reusable without needing to duplicate it.","web-lelp.c-plus-plus-intermediate-what-you-learn-item3-title":"Inheritance","web-lelp.c-plus-plus-intermediate-what-you-learn-item4-description":"Anticipate, reduce and handle errors by implementing exceptions with catch.","web-lelp.c-plus-plus-intermediate-what-you-learn-item4-title":"Exceptions","web-lelp.c-plus-plus-intermediate-what-you-learn-item5-description":"Write and read data from files.","web-lelp.c-plus-plus-intermediate-what-you-learn-item5-title":"Working with files","web-lelp.c-plus-plus-intermediate-what-you-learn-title":"What you'll learn","web-lelp.c-plus-plus-introduction-blog-section-item0-description":"One of the more popular and versatile languages used by programmers, C++ is a broad application general-purpose programming language with exciting potential for creative projects of all types.","web-lelp.c-plus-plus-introduction-blog-section-item0-link":"Continue reading on our blog","web-lelp.c-plus-plus-introduction-blog-section-item0-title":"What is C++ Used For?","web-lelp.c-plus-plus-introduction-blog-section-item1-description":"Last year, in the midst of a ton of other major news stories (the U.S. election drama, the COVID-19 pandemic, and many more), one of the most bold and pervasive hacking incidents in tech history hit the news.","web-lelp.c-plus-plus-introduction-blog-section-item1-link":"Continue reading on our blog","web-lelp.c-plus-plus-introduction-blog-section-item1-title":"What Do You Need To Learn For A Career In Cybersecurity?","web-lelp.c-plus-plus-introduction-blog-section-item2-description":"While C++ is not the easiest language for new developers to master, it offers an excellent option for building advanced and powerful Android apps.  C++ is one of the most popular development languages globally, and is widely employed for creating operating systems, video gaming platforms, and 3D films.","web-lelp.c-plus-plus-introduction-blog-section-item2-link":"Continue reading on our blog","web-lelp.c-plus-plus-introduction-blog-section-item2-title":"3 Languages You Should Know To Become An Android Developer","web-lelp.c-plus-plus-introduction-blog-section-title":"What you'll learn","web-lelp.c-plus-plus-introduction-footer-button":"Start learning","web-lelp.c-plus-plus-introduction-footer-title":"Start learning C++ today","web-lelp.c-plus-plus-introduction-headerInfo-description":"Many languages are tied to the operating system they’re written for. One of the coolest things about C++ is that it’s easy to run it across lots of different operating systems, which means you don’t have to develop the same program several times over. This course is perfect for beginners. You don’t need any previous coding experience — just a mobile phone and 5 minutes a day!","web-lelp.c-plus-plus-introduction-headerInfo-title":"Introduction to C++","web-lelp.c-plus-plus-introduction-meta-title":"Introduction to C++ | Learn with Sololearn","web-lelp.c-plus-plus-introduction-signup-description":"Learn C++ to kick start your career!","web-lelp.c-plus-plus-introduction-signup-title":"Create your free Sololearn account","web-lelp.c-plus-plus-introduction-what-you-learn-item0-description":"Master foundational concepts of coding with C++. These are the building blocks for everything else.","web-lelp.c-plus-plus-introduction-what-you-learn-item0-title":"Foundational concepts","web-lelp.c-plus-plus-introduction-what-you-learn-item1-description":"Save time, reduce errors by including header files in your code.","web-lelp.c-plus-plus-introduction-what-you-learn-item1-title":"Header files","web-lelp.c-plus-plus-introduction-what-you-learn-item2-description":"Use variables to help your program store data of any type.","web-lelp.c-plus-plus-introduction-what-you-learn-item2-title":"Variables","web-lelp.c-plus-plus-introduction-what-you-learn-item3-description":"Use arithmetic operations to solve quantitative problems.","web-lelp.c-plus-plus-introduction-what-you-learn-item3-title":"Arithmetic operations","web-lelp.c-plus-plus-introduction-what-you-learn-item4-description":"Program a machine to make decisions based on your orders with “if” and “else” conditional statements.","web-lelp.c-plus-plus-introduction-what-you-learn-item4-title":"“If” and “Else” statements","web-lelp.c-plus-plus-introduction-what-you-learn-item5-description":"Save time and reduce errors in repetitive operations with loops.","web-lelp.c-plus-plus-introduction-what-you-learn-item5-title":"Loops","web-lelp.c-plus-plus-introduction-what-you-learn-item6-description":"Combine multiple elements into a single variable using arrays.","web-lelp.c-plus-plus-introduction-what-you-learn-item6-title":"Arrays","web-lelp.c-plus-plus-introduction-what-you-learn-item7-description":"Use functions to make your code manageable and reusable.","web-lelp.c-plus-plus-introduction-what-you-learn-item7-title":"Functions","web-lelp.c-plus-plus-introduction-what-you-learn-title":"What you'll learn","web-lelp.c-sharp-intermediate-blog-section-item0-description":"In recent years, the world of web application development has been largely considered the realm of JavaScript. The powerful and versatile language has, thanks to a number of useful frameworks such as Angular, become the premiere choice for creating modern and user-friendly web applications. However, C# has also emerged as a viable alternative to JavaScript - thanks to the creation and development of the Blazor framework.","web-lelp.c-sharp-intermediate-blog-section-item0-link":"Continue reading on our blog","web-lelp.c-sharp-intermediate-blog-section-item0-title":"Building Web Applications Using C# And Blazor","web-lelp.c-sharp-intermediate-blog-section-item1-description":"While Apple often gets much of the hype and glitter in the United States and other Western economies, Android devices remain far more prevalent and popular throughout the world. From Samsung to LG, Huawei to Google, there are a plethora of companies creating Android-powered devices that only thrive thanks to the capabilities and possibilities of Android operating systems. This also means that because of the importance of good Android OS options, Android developers continue to be in significant demand around the world.","web-lelp.c-sharp-intermediate-blog-section-item1-link":"Continue reading on our blog","web-lelp.c-sharp-intermediate-blog-section-item1-title":"3 Languages You Should Know To Become An Android Developer","web-lelp.c-sharp-intermediate-blog-section-item2-description":"C# has come a long way since its launch in 2000. It has been voted the 5th most popular programming language by TIOBE in January 2020. Originally developed by Anders Hejlsberg and his team as part of Microsoft's .NET initiative, over time it has become a multi-paradigm programming language that is not only widely used on the Windows platform but also the iOS\u002FAndroid platforms. There is a heavy demand for developers who can code in C# and career opportunities have multiplied for those who are proficient. As a result, there has been a rapid growth in the number of online learning courses in C#.","web-lelp.c-sharp-intermediate-blog-section-item2-link":"Continue reading on our blog","web-lelp.c-sharp-intermediate-blog-section-item2-title":"The Ultimate Guide to C# Interview Questions","web-lelp.c-sharp-intermediate-blog-section-title":"What you'll learn","web-lelp.c-sharp-intermediate-footer-button":"Start learning","web-lelp.c-sharp-intermediate-footer-title":"Start learning C# today","web-lelp.c-sharp-intermediate-headerInfo-description":"So you’ve got to grips with the basics of C#? Now you want to deepen your understanding of object-oriented programming to design software that is organized around data. This is the course for you! We’ll teach you more advanced techniques that will help you harness the power of C# and master a language used by large organizations, start-ups, and solo developers. Intermediate C# is designed to follow on from Introduction to C#, so check you’re familiar with the concepts there before starting this course.","web-lelp.c-sharp-intermediate-headerInfo-title":"C# Intermediate","web-lelp.c-sharp-intermediate-meta-title":"C# Intermediate | Learn with Sololearn","w time.","web-lelp.sql-intermediate-blog-section-item2-link":"Continue reading on our blog","web-lelp.sql-intermediate-blog-section-item2-title":"What Is SQL Used For?","web-lelp.sql-intermediate-blog-section-title":"What you'll learn","web-lelp.sql-intermediate-footer-button":"Start learning","web-lelp.sql-intermediate-footer-title":"Start learning SQL today","web-lelp.sql-intermediate-headerInfo-description":"If you ask the right questions when looking at data you’ll get powerful insights. Take your database query skills to the next level with this second SQL course. Often, you need multiple tables in order to keep data integrity and avoid duplication. In this course, we’ll teach you how to easily deal with more than one table. Master the process of data manipulation and work with more complex interrelated multi-table databases. This course follows our Introduction to SQL course. Take a quick look at what it covers and if you’re comfortable with those concepts, then dive into Intermediate SQL!","web-lelp.sql-intermediate-headerInfo-title":"SQL Intermediate","web-lelp.sql-intermediate-meta-title":"SQL Intermediate | Learn with Sololearn","web-lelp.sql-intermediate-signup-description":"Learn SQL to kick start your career!","web-lelp.sql-intermediate-signup-title":"Create your free Sololearn account","web-lelp.sql-intermediate-what-you-learn-item0-description":"Use aggregations and string functions to manipulate data.","web-lelp.sql-intermediate-what-you-learn-item0-title":"Manipulate data","web-lelp.sql-intermediate-what-you-learn-item1-description":"Extract data from databases consisting of multiple tables.","web-lelp.sql-intermediate-what-you-learn-item1-title":"Work with multi-table databases","web-lelp.sql-intermediate-what-you-learn-item2-description":"Merge data from different interrelated tables with the join query.","web-lelp.sql-intermediate-what-you-learn-item2-title":"Join data from different tables","web-lelp.sql-intermediate-what-you-learn-title":"What you'll learn","web-lelp.sql-introduction-blog-section-item0-description":"By using SQL to analyze your databases and follow a data-driven marketing strategy, you can be much more effective at organizing, analyzing, and applying data to your marketing campaigns.","web-lelp.sql-introduction-blog-section-item0-link":"Continue reading on our blog","web-lelp.sql-introduction-blog-section-item0-title":"How Marketers Use SQL","web-lelp.sql-introduction-blog-section-item1-description":"One of the most common web hacking techniques, an SQL injection is a method for attacking and manipulating underlying databases. From providing access to protected data, to gaining access to manipulate the database of the targeted application, this tool is a common threat for most website and application managers. Our guide walks you through this widespread threat so you can protect your own applications from it.","web-lelp.sql-introduction-blog-section-item1-link":"Continue reading on our blog","web-lelp.sql-introduction-blog-section-item1-title":"CHEAT SHEET: What Is A SQL Injection?","web-lelp.sql-introduction-blog-section-item2-description":"SQL is the commonly used acronym for Structured Query Language, the standard language for relational database management systems. SQL traces its origins all the way back to 1973, when it was initially created by a team at IBM to manipulate and retrieve the data stored in their system at the time.","web-lelp.sql-introduction-blog-section-item2-link":"Continue reading on our blog","web-lelp.sql-introduction-blog-section-item2-title":"What Is SQL Used For?","web-lelp.sql-introduction-blog-section-title":"What you'll learn","web-lelp.sql-introduction-footer-button":"Start learning","web-lelp.sql-introduction-footer-title":"Start learning SQL today","web-lelp.sql-introduction-headerInfo-description":"Data is powerful, but only if you know how to use it. That’s where SQL comes in! In this course, you’ll learn how to use the SQL standardized database language to access and manipulate data stored in databases. Once you know how to use SQL, you’ll be able to join top companies (and even governments!) that use data to make predictions and decisions about everything from what products to develop to how democracy should function. You don’t need any previous coding experience for this course, so dive right in!","web-lelp.sql-introduction-headerInfo-title":"Introduction to SQL","web-lelp.sql-introduction-meta-title":"Introduction to SQL | Learn with Sololearn","web-lelp.sql-introduction-signup-description":"Learn SQL to kick start your career!","web-lelp.sql-introduction-signup-title":"Create your free Sololearn account","web-lelp.sql-introduction-what-you-learn-item0-description":"Before you learn more about SQL we’ll help you understand how data is stored in a database.","web-lelp.sql-introduction-what-you-learn-item0-title":"Database structures","web-lelp.sql-introduction-what-you-learn-item1-description":"Select, sort and identify data from a database using SQL queries.","web-lelp.sql-introduction-what-you-learn-item1-title":"SQL queries","web-lelp.sql-introduction-what-you-learn-item2-description":"Use where command and logical conditions to filter data.","web-lelp.sql-introduction-what-you-learn-item2-title":"Where command and logical conditions","web-lelp.sql-introduction-what-you-learn-item3-description":"Group data with aggregation functions.","web-lelp.sql-introduction-what-you-learn-item3-title":"Aggregation functions","web-lelp.sql-introduction-what-you-learn-item4-description":"Create tables by adding, updating and removing data.","web-lelp.sql-introduction-what-you-learn-item4-title":"Tables","web-lelp.sql-introduction-what-you-learn-title":"What you'll learn","web-lelp.tech-for-everyone-blog-section-item0-description":"Originally created in 1991 by Guido Van Rossum, a Dutch programmer, Python is one of the more durable and widely used programming languages around the world. It has long stood apart from other languages for being notably easier to learn and use, and thus a great option for both beginning and experienced programmers alike looking for a more simplified solution to various programming needs.","web-lelp.tech-for-everyone-blog-section-item0-link":"Continue reading on our blog","web-lelp.tech-for-everyone-blog-section-item0-title":"What is Python Used For?","web-lelp.tech-for-everyone-blog-section-item1-description":"The face of web development has changed significantly over the past two decades especially as the move toward tablets and smartphones as the primary devices for communication and work continues to rise every year. While laptops and desktops still remain essential for most office environments, remote work, and other professional functions, web development has lost some of the luster it used to have, as mobile development has become a more popular choice for many new and experienced programmers.","web-lelp.tech-for-everyone-blog-section-item1-link":"Continue reading on our blog","web-lelp.tech-for-everyone-blog-section-item1-title":"3 Languages You Should Know To Become A Website Developer","web-lelp.tech-for-everyone-blog-section-item2-description":"After reaching the mainstream in 2016 and 2017, blockchain has emerged as yet another disruptive force in technology, specifically in the worlds of IT and finance. A public electronic ledger built on a P2P system, blockchain offers the unique ability for data to be stored around the globe on thousands of different servers -- while also letting anyone on the network around the globe see everyone else’s inputs and entries in real-time.","web-lelp.tech-for-everyone-blog-section-item2-link":"Continue reading on our blog","web-lelp.tech-for-everyone-blog-section-item2-title":"What is Blockchain?","web-lelp.tech-for-everyone-blog-section-title":"What you'll learn","web-lelp.tech-for-everyone-footer-button":"Start learning","web-lelp.tech-for-everyone-footer-title":"Start learning Tech for Everyone today","web-lelp.tech-for-everyone-headerInfo-description":"Sometimes it’s hard to keep up with our fast-paced digital world. But understanding how tech works gives you a huge competitive advantage. It makes it easier to choose a career you’ll love and take advantage of digital opportunities. Want to think like a coder? This course will fill in the gaps of your digital knowledge. Explore Web technologies, data analysis, and the very basis of how computers work. If you are up for the challenge, you’ll even pick up some coding skills.","web-lelp.tech-for-everyone-headerInfo-title":"Tech for Everyone","web-lelp.tech-for-everyone-meta-title":"Tech for Everyone | Learn with Sololearn","web-lelp.tech-for-everyone-signup-description":"Learn Tech for Everyone to kick start your career!","web-lelp.tech-for-everyone-signup-title":"Create your free Sololearn account","web-lelp.tech-for-everyone-what-you-learn-item0-description":"Learn to think like a coder \n Understand how machines work \n Learn what programming languages are \n Get a quick & easy introduction to algorithms","web-lelp.tech-for-everyone-what-you-learn-item0-title":"Computers, Code and Algorithms","web-lelp.tech-for-everyone-what-you-learn-item1-description":"Ever wondered how the Web deals with so much information? In this module you’ll learn: \n - How information flows on the Web. \n - What technologies are used to build websites. \n - The best careers in Web development","web-lelp.tech-for-everyone-what-you-learn-item1-title":"Web Technologies and the languages of the Web","web-lelp.tech-for-everyone-what-you-learn-item2-description":"Learn how data gets generated, stored, and process \n Turn data into insights \n The best jobs in the data industry","web-lelp.tech-for-everyone-what-you-learn-item2-title":"Databases and Data Analysis","web-lelp.tech-for-everyone-what-you-learn-title":"What you'll learn","web-lelp.web-development-blog-section-item0-description":"Forms are widely used as essential website components. It's possible to create any type of form to fit the purpose and goals of your particular site, with HTML5 and CSS3. Each brings a number of great features and attributes that substantially broaden the boundaries of form design.","web-lelp.web-development-blog-section-item0-link":"Continue reading on our blog","web-lelp.web-development-blog-section-item0-title":"HTML5 and CSS3 Forms: 4 Useful Designs","web-lelp.web-development-blog-section-item1-description":"By properly employing HTML comments, you can explain the choices you made to a colleague reviewing your code and make necessary adjustments or bugs that need fixing easier for others to see. This is an essential 'best practice' among experienced HTML programmers and one that you'll need to master to work as part of a team or bring people on board your own projects. So how do you do it? Let's walk through the basics and essential steps you will need.","web-lelp.web-development-blog-section-item1-link":"Continue reading on our blog","web-lelp.web-development-blog-section-item1-title":"CHEAT SHEET: How To Comment In HTML","web-lelp.web-development-blog-section-item2-description":"CSS is an invaluable tool for adding style and clearly formatting information to a web page designed with HTML. Far beyond just a simple layout and adding static images, CSS offers options for adding dynamic, user-experience-friendly front-end elements that can transform a static HTML page into an interactive application that wows customers and clients. This guide walks you through the basics and essential steps you need to add CSS to HTML for any project.","web-lelp.web-development-blog-section-item2-link":"Continue reading on our blog","web-lelp.web-development-blog-section-item2-title":"CHEAT SHEET: How To Add CSS To HTML","web-lelp.web-development-blog-section-title":"What you'll learn","web-lelp.web-development-footer-button":"Start learning","web-lelp.web-development-footer-title":"Start learning Web Development today","web-lelp.web-development-headerInfo-description":"Web Development is the foundation of modern websites and applications. This course covers HTML, CSS, and JavaScript, the core technologies for building interactive and responsive web pages. Perfect for beginners, this course will give you the skills needed to create stunning websites and kickstart your career in web development.","web-lelp.web-development-headerInfo-title":"Web Development","web-lelp.web-development-meta-title":"Web Development | Learn with Sololearn","web-lelp.web-development-signup-description":"Learn Web Development to kick start your career!","web-lelp.web-development-signup-title":"Create your free Sololearn account","web-lelp.web-development-what-you-learn-item0-description":"Learn the basic structure of a webpage and discover how you can help a web browser understand your content","web-lelp.web-development-what-you-learn-item0-title":"HTML Basics","web-lelp.web-development-what-you-learn-item1-description":"Style your web pages with CSS to create visually appealing and responsive designs","web-lelp.web-development-what-you-learn-item1-title":"CSS Styling","web-lelp.web-development-what-you-learn-item2-description":"Add interactivity and dynamic content to your web pages using JavaScript","web-lelp.web-development-what-you-learn-item2-title":"JavaScript","web-lelp.web-development-what-you-learn-item3-description":"Create web pages that look great on any device with responsive design techniques","web-lelp.web-development-what-you-learn-item3-title":"Responsive Design","web-lelp.web-development-what-you-learn-item4-description":"Learn how to manipulate the Document Object Model (DOM) to update web page content dynamically","web-lelp.web-development-what-you-learn-item4-title":"DOM Manipulation","web-lelp.web-development-what-you-learn-item5-description":"Handle user interactions and events to create interactive web applications","web-lelp.web-development-what-you-learn-item5-title":"Events and Event Handling","web-lel
