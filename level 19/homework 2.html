<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration</title>
</head>
<body>
    <form>
        <label for="username">username:</label>
        <input type="text" id="username" required name="username"><br><br>
        <label for="email">email:</label>
        <input type="email" id="email" required name="email"><br><br>
        <label for="password">password</label>
        <input type="password" id="password" required name="passworrd"><br><br>
        <label for="age">age:</label>
        <input type="number" id="age" required name="age"><br><br>
        <label for="radio">male:</label>
        <input type="radio" id="radio" name="male">
        <label for="radio2">female:</label>
        <input type="radio" id="radio2" name="female"><br><br>
        <input type="submit" id="submit" required>
    </form>
</body>
</html>
